<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Emissions Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .dashboard { display: flex; gap: 20px; }
        .controls { margin-bottom: 20px; padding: 10px; background: #f4f4f4; border-radius: 5px; }
        button, select { margin-right: 15px; padding: 5px; }
        .tooltip {
            position: absolute; text-align: center; padding: 8px; font-size: 12px;
            background: rgba(0,0,0,0.8); color: #fff; border-radius: 4px; pointer-events: none;
            opacity: 0; transition: opacity 0.2s;
        }
        .bar { cursor: pointer; transition: fill 0.2s; }
        .bar:hover { stroke: #000; stroke-width: 2px; }
        .selected { stroke: #000; stroke-width: 3px; }
    </style>
</head>
<body>

    <h1>Global Emissions Interactive Dashboard</h1>
    
    <div class="controls">
        <label><strong>Filter (Sector):</strong> 
            <select id="sectorFilter">
                <option value="All">All Sectors</option>
                <option value="Power">Power</option>
                <option value="Industry">Industry</option>
                <option value="Ground Transport">Ground Transport</option>
                <option value="Residential">Residential</option>
                <option value="Domestic Aviation">Domestic Aviation</option>
                <option value="International Aviation">International Aviation</option>
            </select>
        </label>

        <label><strong>Encode (Scale):</strong>
            <select id="scaleEncode">
                <option value="linear">Linear</option>
                <option value="log">Logarithmic</option>
            </select>
        </label>

        <button id="sortBtn"><strong>Reconfigure:</strong> Sort by Value / Alphabetical</button>
        
        <button id="abstractBtn"><strong>Abstract:</strong> Group EU vs Non-EU</button>
    </div>

    <div class="dashboard">
        <div id="barChart"></div>
        <div id="donutChart"></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        const margin = {top: 40, right: 20, bottom: 100, left: 80},
              width = 700 - margin.left - margin.right,
              height = 500 - margin.top - margin.bottom;

        const svgBar = d3.select("#barChart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);
            
        const svgPie = d3.select("#donutChart").append("svg")
            .attr("width", 400).attr("height", 400)
            .append("g").attr("transform", "translate(200,200)");

        const tooltip = d3.select("#tooltip");
        
        let globalData = [];
        let currentSector = "All";
        let isLogScale = false;
        let isSorted = false;
        let isAbstracted = false;
        let selectedCountry = null;

        // Load Dataset
        d3.csv("dataset.csv").then(data => {
            // Parse data
            data.forEach(d => d.value = +d.value);
            globalData = data.filter(d => d.country !== "WORLD"); // Exclude WORLD total to avoid double counting
            updateVisualization();
        });

        function updateVisualization() {
            // 1. FILTER: filter by sector
            let filtered = currentSector === "All" ? globalData : globalData.filter(d => d.sector === currentSector);

            // Aggregate by country
            let aggregated = d3.rollups(filtered, v => d3.sum(v, d => d.value), d => d.country)
                               .map(([country, value]) => ({country, value}));

            // 7. ABSTRACT: Group into EU vs Non-EU
            if (isAbstracted) {
                const euCountries = ["EU27 & UK", "France", "Germany", "Italy", "Spain"];
                let absData = [{country: "EU Region", value: 0}, {country: "Rest of World", value: 0}];
                aggregated.forEach(d => {
                    if (euCountries.includes(d.country)) absData[0].value += d.value;
                    else absData[1].value += d.value;
                });
                aggregated = absData;
            }

            // 5. RECONFIGURE: Sort data
            if (isSorted) {
                aggregated.sort((a, b) => d3.descending(a.value, b.value));
            } else {
                aggregated.sort((a, b) => d3.ascending(a.country, b.country));
            }

            drawBarChart(aggregated);
            drawDonutChart(filtered);
        }

        function drawBarChart(data) {
            svgBar.selectAll("*").remove();

            const x = d3.scaleBand().range([0, width]).padding(0.2).domain(data.map(d => d.country));
            
            // 3. ENCODE: Switch between Linear and Log scale
            const yMax = d3.max(data, d => d.value) || 1;
            const y = isLogScale 
                ? d3.scaleLog().range([height, 0]).domain([0.1, yMax]).clamp(true)
                : d3.scaleLinear().range([height, 0]).domain([0, yMax]);

            svgBar.append("g").attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x)).selectAll("text")
                .attr("transform", "translate(-10,0)rotate(-45)").style("text-anchor", "end");

            svgBar.append("g").call(isLogScale ? d3.axisLeft(y).ticks(5, "~s") : d3.axisLeft(y));

            svgBar.selectAll(".bar").data(data).enter().append("rect")
                .attr("class", d => `bar ${d.country === selectedCountry ? 'selected' : ''}`)
                .attr("x", d => x(d.country))
                .attr("y", d => y(Math.max(0.1, d.value)))
                .attr("width", x.bandwidth())
                .attr("height", d => height - y(Math.max(0.1, d.value)))
                .attr("fill", "#69b3a2")
                // 1. SELECT & 4. CONNECT: Clicking highlights bar and updates pie chart
                .on("click", (event, d) => {
                    selectedCountry = selectedCountry === d.country ? null : d.country;
                    updateVisualization();
                })
                // 6. ELABORATE: Tooltips showing exact data details
                .on("mouseover", (event, d) => {
                    tooltip.style("opacity", 1)
                           .html(`<strong>${d.country}</strong><br/>Value: ${d.value.toFixed(2)}`)
                           .style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", () => tooltip.style("opacity", 0));
        }

        function drawDonutChart(data) {
            svgPie.selectAll("*").remove();
            if (!selectedCountry && !isAbstracted) {
                svgPie.append("text").attr("text-anchor", "middle").text("Select a country (bar) for sector breakdown").style("fill", "#888");
                return;
            }

            let pieData = data.filter(d => isAbstracted ? true : d.country === selectedCountry);
            let aggregatedPie = d3.rollups(pieData, v => d3.sum(v, d => d.value), d => d.sector);
            
            const color = d3.scaleOrdinal(d3.schemeSet2);
            const pie = d3.pie().value(d => d[1]);
            const arc = d3.arc().innerRadius(100).outerRadius(150);

            const arcs = svgPie.selectAll("arc").data(pie(aggregatedPie)).enter().append("g");
            arcs.append("path")
                .attr("d", arc)
                .attr("fill", d => color(d.data[0]))
                .on("mouseover", (event, d) => {
                    tooltip.style("opacity", 1)
                           .html(`<strong>${d.data[0]}</strong><br/>Value: ${d.data[1].toFixed(2)}`)
                           .style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", () => tooltip.style("opacity", 0));
                
            arcs.append("text")
                .attr("transform", d => `translate(${arc.centroid(d)})`)
                .attr("text-anchor", "middle")
                .style("font-size", "10px")
                .text(d => d.data[0].substring(0, 10));
        }

        // Event Listeners
        d3.select("#sectorFilter").on("change", function() { currentSector = this.value; updateVisualization(); });
        d3.select("#scaleEncode").on("change", function() { isLogScale = (this.value === "log"); updateVisualization(); });
        d3.select("#sortBtn").on("click", () => { isSorted = !isSorted; updateVisualization(); });
        d3.select("#abstractBtn").on("click", () => { isAbstracted = !isAbstracted; selectedCountry = null; updateVisualization(); });
    </script>
</body>
</html>
